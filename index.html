  <script src="assets/js/main.js"></script>
  <script>
    (async () => {
      const { loadContent, renderHeader, renderFooter, projectCardHTML } = window.ArifSite;
      const data = await loadContent();
      const { site, hero, projects, experience } = data;

      renderHeader(site);
      renderFooter(data);

      document.title = `${site.name} | ${site.role}`;

      const statusIndicator = document.getElementById('statusIndicator');
      const statusLabel = document.getElementById('statusLabel');
      statusLabel.textContent = hero.status;
      if (hero.available) statusIndicator.classList.add('is-available');

      document.getElementById('heroHeading').textContent = hero.heading;
      document.getElementById('heroBio').textContent = hero.bio;

      document.getElementById('heroActions').innerHTML = `
        <a class="btn btn-primary" href="${hero.primaryCta.href}">${hero.primaryCta.label} ${window.ArifSite.arrowSVG()}</a>
        <a class="btn btn-secondary" href="${hero.secondaryCta.href}">${hero.secondaryCta.label}</a>
      `;

      document.getElementById('projectsIntro').textContent = data.projectsIntro;

      const grid = document.getElementById('projectGrid');
      grid.innerHTML = projects.slice(0, 4).map(projectCardHTML).join('');

      const timeline = document.getElementById('timeline');
      timeline.innerHTML = experience
        .map(
          (e) => `
        <div class="timeline-row">
          <div class="timeline-years">${e.years}</div>
          <div class="timeline-tick"></div>
          <div class="timeline-body">
            <h3>${e.company}</h3>
            <span class="timeline-role">${e.role}</span>
            <p class="desc">${e.description}</p>
          </div>
        </div>`
        )
        .join('');
    })();
  </script>
